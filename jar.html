<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Last Wish</title>

<link rel="stylesheet" href="jar.css">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Pacifico&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="container">

    <h1>One Last Wish </h1>

    <p class="hint">Click here</p>

    <div class="jar" id="jar">

        <div class="lid" id="lid"></div>

        <div class="glass">

            <div class="paper-inside"></div>

        </div>

    </div>

</div>

<div class="letter" id="letter">

    <div class="paper">

        <h2>My Wish</h2>

        <p id="message">
I hope we stay best friends forever.

No matter where life takes us,
I'll always be thankful
for every memory we made together.

You mean more than
you'll ever know. 
        </p>
<div class="music-player">

    <button id="playMusic">▶ Play Our Song</button>

    <audio id="finalSong">
        <source src="music/Albumaty.Com_bhaa_sltan_ydwm_alaman (1).mp3" type="audio/mpeg">
    </audio>

</div>
        <button id="restart">
            Start Again ↻
        </button>

    </div>

</div>

<script src="jar.js"></script>

</body>

</html>
